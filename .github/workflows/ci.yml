---
name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  htmlproofer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: setup-hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true
      - name: hugo-build
        run: hugo --minify
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
      - name: install-htmlproofer
        run: gem install html-proofer -v 5.2.0
      - name: run-htmlproofer
        run: |
          htmlproofer --checks "Images,Links,Scripts,Favicon,Opengraph" --enforce-https --ignore-status-codes 999 public/

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v22

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install-yamllint
        run: pip install yamllint==1.38.0
      - name: yamllint==1.38.0
        run: yamllint .
